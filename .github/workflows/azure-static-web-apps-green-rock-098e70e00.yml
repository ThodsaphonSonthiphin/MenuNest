# =============================================================
# CD Pipeline — Deploy Frontend ไป Azure Static Web Apps
# =============================================================
# ไฟล์นี้ Azure สร้างให้อัตโนมัติเมื่อเชื่อม Static Web App เข้ากับ GitHub
# เราปรับให้เข้ากับ Vite (output = dist/) และ inject env vars

# ชื่อที่แสดงใน GitHub Actions tab
name: Azure Static Web Apps CI/CD

# ===== TRIGGER =====
on:
  # Deploy จริงเมื่อ push เข้า main
  push:
    branches:
      - main
  # สร้าง preview environment เมื่อมี PR (feature ของ Static Web Apps)
  # closed = PR ถูก merge/ปิด → ลบ preview env
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:

  # ----- Job 1: Build + Deploy -----
  # รันเมื่อ push เข้า main หรือมี PR ที่ยังเปิดอยู่
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # Step 1: ดึง code จาก repo มาที่ runner
      - name: Checkout code
        uses: actions/checkout@v4           # v4 = version ล่าสุด ปลอดภัยกว่า v3
        with:
          submodules: true                  # ดึง git submodules ด้วย (ถ้ามี)
          lfs: false                        # ไม่ต้องดึง Git LFS files (ไฟล์ใหญ่)

      # Step 2: ติดตั้ง Node.js (Static Web App action ไม่ได้ setup ให้เอง)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'                # เดียวกับ CI pipeline ให้ match กัน
          cache: 'npm'                      # cache node_modules ระหว่าง run
          cache-dependency-path: frontend/package-lock.json

      # Step 3: Install packages
      - name: Install dependencies
        run: npm ci                         # clean install — เร็วและ reliable กว่า npm install
        working-directory: frontend

      # Step 4: Build production
      # Vite อ่าน VITE_* env vars ตอน build แล้ว embed เข้า bundle
      # ต้อง set ตรงนี้ก่อนรัน build
      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID }}
          VITE_MSAL_AUTHORITY: ${{ secrets.VITE_MSAL_AUTHORITY }}
          VITE_API_SCOPE: ${{ secrets.VITE_API_SCOPE }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SYNCFUSION_LICENSE_KEY: ${{ secrets.VITE_SYNCFUSION_LICENSE_KEY }}
        run: npm run build                  # output = frontend/dist/

      # Step 5: Deploy ไป Azure Static Web App
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Token ที่ Azure สร้างเป็น secret ให้อัตโนมัติ
          # ไม่ต้องสร้างเอง Azure ผูกไว้แล้ว
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_ROCK_098E70E00 }}

          # Token ของ GitHub เอง — ใช้สำหรับ comment กลับไปที่ PR
          # (Azure จะ comment บอก preview URL ใน PR)
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          action: "upload"                  # upload ไฟล์ขึ้น Static Web App

          ###### Build Configurations ######
          # สำคัญ: เมื่อ skip_app_build: true → Azure upload app_location ตรงๆ
          # ถ้าชี้ไป ./frontend จะ upload ทั้งโฟลเดอร์ (รวม node_modules 425 MB) → เกิน 250 MB limit
          # ต้องชี้ไปที่ built output (dist) ตรงๆ
          app_location: "frontend/dist"     # path ของ built output (ไม่ใช่ source)
          api_location: ""                  # path สำหรับ Azure Functions (ไม่ใช้ — backend เราอยู่ App Service)
          output_location: ""               # ว่างไว้ — app_location ชี้ไป dist แล้ว
          skip_app_build: true              # ✅ skip build ภายใน Azure — เราทำเองใน Step 4 แล้ว
                                            # ทำไมต้อง skip? เพื่อ inject env vars ได้

  # ----- Job 2: Close PR (ลบ preview environment) -----
  # รันเฉพาะเมื่อ PR ถูก merge หรือปิด → ลบ preview URL ทิ้ง ประหยัด resource
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_ROCK_098E70E00 }}
          action: "close"                   # ลบ preview environment
