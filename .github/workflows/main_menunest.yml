# =============================================================
# CD Pipeline — Deploy Backend (.NET) ไป Azure App Service
# =============================================================
# Azure สร้างไฟล์นี้ให้อัตโนมัติเมื่อเชื่อม App Service → GitHub
# เราปรับให้:
#   1. Path ถูก (backend/ อยู่ใน subfolder ไม่ใช่ root)
#   2. Publish เฉพาะ MenuNest.WebApi (ไม่ใช่ทุก project)
#   3. ใช้ ubuntu-latest แทน windows (เร็วกว่า + ฟรีมากกว่า)

name: Build and deploy ASP.Net Core app to Azure Web App - menunest

# ===== TRIGGER =====
on:
  push:
    branches:
      - main              # deploy เมื่อ push ไป main
  workflow_dispatch:      # อนุญาตให้ trigger manual จากหน้า Actions

jobs:

  # ----- Job 1: Build + Publish artifact -----
  # แยก build กับ deploy เป็น 2 jobs เพื่อ:
  #   - ถ้า build fail จะไม่พยายาม deploy
  #   - artifact ใช้ซ้ำได้ (ไม่ต้อง build 2 ครั้ง)
  build:
    runs-on: ubuntu-latest    # Linux เร็ว + ถูกกว่า windows-latest 2 เท่า (ใน private repo)
    permissions:
      contents: read          # อนุญาตอ่าน code จาก repo

    steps:
      # Step 1: ดึง code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: ติดตั้ง .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Step 3: Restore packages
      # วาง solution ที่ backend/MenuNest.sln — restore ทีเดียวได้ทุก project
      - name: Restore dependencies
        run: dotnet restore backend/MenuNest.sln

      # Step 4: Build
      - name: Build
        run: dotnet build backend/MenuNest.sln --configuration Release --no-restore

      # Step 5: Publish เฉพาะ WebApi
      # --no-build = ไม่ build ซ้ำ ใช้ผลลัพธ์ step 4
      # -o = output directory (relative ไป working-dir)
      - name: Publish
        run: dotnet publish backend/src/MenuNest.WebApi/MenuNest.WebApi.csproj --configuration Release --no-build --output ./publish

      # Step 6: Upload เป็น artifact ให้ job ถัดไปใช้
      # artifact = เก็บไฟล์ระหว่าง jobs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish

  # ----- Job 2: Deploy artifact ไป Azure -----
  deploy:
    runs-on: ubuntu-latest
    needs: build              # รอ build job จบก่อน (ถ้า build fail → ไม่ทำ deploy)

    permissions:
      id-token: write         # จำเป็นสำหรับ OIDC — ขอ JWT token จาก GitHub
      contents: read

    steps:
      # Step 1: Download artifact จาก build job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ./publish     # เอาไปวางที่ ./publish

      # Step 2: Login Azure ด้วย OIDC (ไม่มี password)
      # GitHub ออก JWT → Azure verify → ได้ short-lived access token
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F94D5B2F0B9C40C38F6DF023751B6475 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5BD550016E07481C80A0CEA8666EB250 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D95DA3087BD14EDDB0689DA1D2173259 }}

      # Step 3: Deploy ไป App Service
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'menunest'          # ชื่อ App Service ใน Azure
          slot-name: 'Production'       # deployment slot — default = Production
          package: ./publish            # path ของ published artifact
